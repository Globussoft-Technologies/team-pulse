name: Daily team activity report

# Triggers:
#   - Scheduled run at 00:00 UTC every day
#   - Manual trigger via the Actions UI
# Hardening:
#   - No pull_request / push triggers — secrets never exposed to PR contributors
#   - permissions: read-only on this repo (cross-repo write happens via the PAT)
#   - Minimal step set; only official actions
#   - Token-bearing steps redirect stderr to /dev/null

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout team-pulse
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify gh CLI auth
        env:
          GH_TOKEN: ${{ secrets.ORG_REPORTER_TOKEN }}
        run: gh auth status

      - name: Generate markdown report
        env:
          # Primary token (used when no per-org override exists)
          GH_TOKEN: ${{ secrets.ORG_REPORTER_TOKEN }}
          # Per-org tokens. If a secret is unset it evaluates to "" and we
          # fall back to GH_TOKEN. Use this if you have separate fine-grained
          # PATs per org. Skip these and just set ORG_REPORTER_TOKEN to a
          # classic PAT if one token covers both orgs.
          GH_TOKEN_GLOBUSSOFT_TECHNOLOGIES: ${{ secrets.ORG_REPORTER_TOKEN }}
          GH_TOKEN_EMPCLOUD: ${{ secrets.EMPCLOUD_REPORTER_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/team_activity.py --days 1 --md > report.md 2>/dev/null
          echo "::group::report.md preview"
          head -50 report.md
          echo "::endgroup::"

      - name: Clone .github-private
        env:
          GH_TOKEN: ${{ secrets.ORG_REPORTER_TOKEN }}
        run: |
          git config --global user.name  "team-pulse-bot"
          git config --global user.email "team-pulse@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Globussoft-Technologies/.github-private.git" private 2>/dev/null

      - name: Inject report between markers
        run: |
          python scripts/inject_report.py private/profile/README.md report.md

      - name: Commit and push if changed
        working-directory: private
        env:
          GH_TOKEN: ${{ secrets.ORG_REPORTER_TOKEN }}
        run: |
          if git diff --quiet profile/README.md; then
            echo "No changes to push."
            exit 0
          fi
          git add profile/README.md
          git commit -m "report: daily team activity $(date -u +'%Y-%m-%d')"
          git push
